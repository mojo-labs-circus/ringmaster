models:
  router: "qwen2.5:3b"         # dev (nomadbaker) — full system: mistral:7b
  general: "qwen2.5:3b"        # dev (nomadbaker) — full system: llama3.1:8b
  reasoning: "qwen2.5:3b"      # dev (nomadbaker) — full system: deepseek-r1:14b
  embedding: "nomic-embed-text" # unused on nomadbaker (no ChromaDB) — full system: nomic-embed-text
  fallback: "qwen2.5:3b"       # dev (nomadbaker) — full system: mistral:7b
  multimodal: ""                # placeholder — full system: llava:13b (Phase 9)

ollama:
  base_url: "http://localhost:11434"
  timeout: 120

server:
  host: "127.0.0.1"  # dev — full system: 0.0.0.0
  port: 8000
  dev: true

auth:
  access_token_expire_hours: 24
  refresh_token_expire_days: 90
  brute_force_limit: 5        # failed login attempts before admin is notified
  brute_force_window_minutes: 10

db:
  path: "~/.jarvis"  # dev only — SQLite files written here. Ignored when JARVIS_DB_BACKEND=postgres.

history:
  context_window_budget: 16000

maintenance:
  retention_days: 90
  log_error_threshold: 50

logging:
  path: "~/.jarvis/jarvis.log"
  max_bytes: 10485760  # 10 MB
  backup_count: 5

memory:
  vault_base: "~/.jarvis/vault"  # dev (nomadbaker) — pearlybaker: /mnt/hdd/jarvis, server: /tank/docker/jarvis/vaults
  chunk_size: 500
  chunk_overlap: 50

skills:
  shared_approved_path: "~/.jarvis/skills/approved"  # dev — full system: /mnt/hdd/jarvis/shared/05-skills/approved

system:
  allowed_paths:
    - "~/projects"
    - "/tmp"

coding_team:
  max_review_iterations: 3

status_messages:
  router: "Thinking..."
  planner: ""
  memory_retrieve: "Searching memory..."
  orchestrator: ""
  conversation: ""
  memory: ""
  web: "Searching the web..."
  tasks: ""
  system: ""
  code: ""
  responder: ""
